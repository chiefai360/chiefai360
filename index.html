function getCoursesForArc(arc){
  return ({pioneer:COURSES.governance,strategist:COURSES.strategy,builder:COURSES.technical,experimenter:COURSES.scaling,guardian:COURSES.strategy,explorer:COURSES.foundations})[arc.id]||COURSES.foundations;
}

function calcScores(ans){
  const ds={};
  DIMS.forEach(d=>{
    const qs=QS.filter(q=>q.dim===d.id);
    ds[d.id]=Math.round(qs.reduce((s,q)=>s+(ans[q.id]||3),0)/(qs.length*5)*100);
  });
  return {dim:ds,overall:Math.round(Object.values(ds).reduce((a,b)=>a+b,0)/DIMS.length)};
}

function getArchetype(s){
  const {dim:d,overall:o}=s;
  if(o>=75) return ARCHETYPES.pioneer;
  if(d.governance>=70) return ARCHETYPES.guardian;
  if(d.leadership>=70) return ARCHETYPES.strategist;
  if(d.technology>=65&&d.data>=60) return ARCHETYPES.builder;
  if(d.people>=65) return ARCHETYPES.experimenter;
  if(o>=50) return ARCHETYPES.builder;
  if(o>=35) return ARCHETYPES.experimenter;
  return ARCHETYPES.explorer;
}

async function callClaude(system,user,max=900){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,system,messages:[{role:"user",content:user}]})
    });
    return (await r.json()).content?.[0]?.text||"";
  }catch{return "";}
}

}

function Btn({children,onClick,v="primary",disabled,full,size="md",style:sx={}}){
  const pad=size==="lg"?"16px 42px":size==="sm"?"8px 18px":"12px 26px";
  const fz=size==="lg"?16:size==="sm"?13:14;
  const variants={
    primary:{background:G,color:"#fff",boxShadow:"0 4px 22px #FF6B0038"},
    ghost:{background:"transparent",color:"#E4D8FF",border:"1px solid #2D1555"},
    soft:{background:"#FF6B0014",color:"#FF8C35",border:"1px solid #FF6B0028"},
    green:{background:"linear-gradient(135deg,#1A9A60,#2EE5A0)",color:"#fff"},
    purple:{background:"linear-gradient(135deg,#9320F0,#B050FF)",color:"#fff"},
  };
  return(
    <button onClick={onClick} disabled={disabled}
      style={{padding:pad,borderRadius:11,fontSize:fz,fontWeight:700,cursor:disabled?"not-allowed":"pointer",border:"none",fontFamily:FS,opacity:disabled?0.4:1,width:full?"100%":undefined,transition:"all 0.18s",display:"inline-flex",alignItems:"center",justifyContent:"center",gap:7,...variants[v],...sx}}

      onMouseOut={e=>e.currentTarget.style.transform="translateY(0)"}
    >{children}</button>
  );
}

function SkillRadar({scores}){
  const cx=110,cy=110,r=76,n=DIMS.length;
  const ang=i=>(i/n)*2*Math.PI-Math.PI/2;
  const pt=(v,i)=>{const a=ang(i),d=v/100*r;return[cx+d*Math.cos(a),cy+d*Math.sin(a)];};
  const grid=f=>DIMS.map((_,i)=>{const a=ang(i),d=f*r;return`${cx+d*Math.cos(a)},${cy+d*Math.sin(a)}`;}).join(" ");
  const pts=DIMS.map((d,i)=>pt(scores.dim[d.id],i));
  return(
    <svg width={220} height={220} style={{overflow:"visible"}}>
      {[0.25,0.5,0.75,1].map(f=><polygon key={f} points={grid(f)} fill="none" stroke="#1E0D38" strokeWidth="1"/>)}
      {DIMS.map((_,i)=>{const a=ang(i);return<line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke="#1E0D38" strokeWidth="1"/>;})}
      <polygon points={pts.map(p=>p.join(",")).join(" ")} fill="#FF6B0022" stroke="#FF6B00" strokeWidth="1.5"/>
      {DIMS.map((d,i)=>{const a=ang(i),lx=cx+(r+26)*Math.cos(a),ly=cy+(r+26)*Math.sin(a);return<text key={i} x={lx} y={ly} fill={d.color} fontSize="10" textAnchor="middle" dominantBaseline="middle" fontFamily={FS} fontWeight="700">{d.short}</text>;})}
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r={4} fill={DIMS[i].color}/>)}
    </svg>
  );
}

function ReportBlock({title,content,color,icon}){
  const [open,setOpen]=useState(true);
  if(!content) return(
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 0",color:"#9478C0",fontSize:13,fontFamily:FB}}>
      <span style={{width:15,height:15,border:"2px solid #1E0D38",borderTop:`2px solid ${color}`,borderRadius:"50%",display:"inline-block",animation:"spin 1s linear infinite",flexShrink:0}}/>
      Preparing {title.toLowerCase()}…
    </div>
  );
  return(
    <div>
      <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",background:"none",border:"none",padding:"13px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}><span style={{color,fontSize:17}}>{icon}</span><span style={{fontSize:15,fontWeight:700,color:"#fff",fontFamily:FS}}>{title}</span></div>
        <span style={{color:"#9478C0",fontSize:11,fontFamily:FB}}>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div style={{paddingLeft:26,paddingBottom:16}}>
          {content.split("\n").map((l,i)=>{
            const html=l.replace(/\*\*(.+?)\*\*/g,`<strong style="color:#fff;font-weight:700">$1</strong>`);
            if(l.startsWith("## ")) return<div key={i} style={{borderLeft:`3px solid ${color}`,paddingLeft:11,margin:"14px 0 7px"}}><h3 style={{fontSize:11,fontWeight:700,color,margin:0,textTransform:"uppercase",letterSpacing:0.9,fontFamily:FS}}>{l.slice(3)}</h3></div>;
            if(l.startsWith("- ")) return<div key={i} style={{display:"flex",gap:8,marginBottom:6}}><span style={{color,fontSize:7,marginTop:9,flexShrink:0}}>◆</span><span style={{color:"#E4D8FF",fontSize:13,lineHeight:1.75,fontFamily:FB}} dangerouslySetInnerHTML={{__html:html.slice(2)}}/></div>;
            if(!l.trim()) return<div key={i} style={{height:6}}/>;
            return<p key={i} style={{color:"#E4D8FF",fontSize:13,lineHeight:1.75,margin:"2px 0",fontFamily:FB}} dangerouslySetInnerHTML={{__html:html}}/>;
          })}
        </div>
      )}
    </div>
  );
}

          {i<total-1&&<div style={{width:28,height:2,background:i<current?"#FF6B00":"#1E0D38",borderRadius:2}}/>}

      ))}
      <span style={{color:"#9478C0",fontSize:11,fontFamily:FB,marginLeft:4}}>Step {current+1} of {total}</span>

}

        <div style={{background:"#050208",border:"1px solid #1E0D38",borderRadius:11,padding:"13px 18px",marginBottom:13,display:"flex",gap:13,flexWrap:"wrap"}} className="fu">
          <div style={{flex:1,minWidth:180}}>
            <div style={{color:"#9478C0",fontSize:9,fontFamily:FB,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Assessment context</div>
            <div style={{color:"#fff",fontSize:13,fontFamily:FB,fontWeight:600,marginBottom:2}}>{profile.company} · {profile.industry}</div>
            {profile.website&&<a href={profile.website} target="_blank" rel="noopener noreferrer" style={{color:"#FF8C35",fontSize:11,fontFamily:FB,display:"block",marginBottom:3}}>🔗 {profile.website}</a>}
            {profile.companyDesc&&<p style={{color:"#9478C0",fontSize:11,fontFamily:FB,lineHeight:1.6,margin:0}}>{profile.companyDesc}</p>}
          </div>
          {profile.aiThinking&&<div style={{flex:1,minWidth:180,borderLeft:"1px solid #1E0D38",paddingLeft:13}}>
            <div style={{color:"#9478C0",fontSize:9,fontFamily:FB,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Stated AI thinking</div>
            <p style={{color:"#E4D8FF",fontSize:11,fontFamily:FB,lineHeight:1.65,fontStyle:"italic",margin:0}}>"{profile.aiThinking}"</p>
          </div>}
        </div>
        <div style={{background:`linear-gradient(140deg,${arc.bg},#0F0820)`,border:`1.5px solid ${arc.color}48`,borderRadius:18,padding:"24px 28px",marginBottom:13}} className="fu">
          <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
            <div style={{fontSize:44}}>{arc.emoji}</div>
            <div style={{flex:1}}>
              <div style={{fontFamily:FS,fontSize:9,fontWeight:700,color:arc.color,textTransform:"uppercase",letterSpacing:1.4,marginBottom:4}}>Your organisation's archetype</div>
              <div style={{fontFamily:FS,fontSize:22,fontWeight:900,color:arc.color,marginBottom:3}}>{arc.name}</div>
              <div style={{color:"#E4D8FF",fontSize:13,fontFamily:FB}}>{profile.company} · {profile.industry} · {profile.name}</div>
            </div>
            <div style={{textAlign:"right"}}><div style={{fontFamily:FS,fontSize:44,fontWeight:900,color:arc.color,lineHeight:1}}>{scores.overall}</div><div style={{color:"#9478C0",fontSize:11,fontFamily:FB}}>/ 100 org score</div></div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:13,marginBottom:13}}>
          <div style={CS} className="fu">
            <div style={{fontFamily:FS,fontWeight:700,color:"#fff",fontSize:15,marginBottom:4}}>📨 Invite Your Team</div>
            <p style={{color:"#E4D8FF",fontSize:12,fontFamily:FB,lineHeight:1.65,marginBottom:13}}>Each member takes the assessment for <strong style={{color:"#fff"}}>free</strong>.</p>
            <div style={{background:"#050208",borderRadius:9,padding:"12px",marginBottom:11}}>
              <div style={{color:"#9478C0",fontSize:9,fontFamily:FB,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Team Invite Link</div>
              <div style={{fontFamily:"monospace",fontSize:11,color:"#2EE5A0",wordBreak:"break-all",marginBottom:8}}>https://chiefai360.com/team/{teamCode}</div>
              <Btn onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText("https://chiefai360.com/team/"+teamCode).catch(()=>{});alert("Copied!");}} v="green" size="sm" full>Copy Invite Link</Btn>
            </div>
            <div style={{background:"#050208",borderRadius:9,padding:"12px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{color:"#E4D8FF",fontSize:12,fontFamily:FS,fontWeight:600}}>Team Responses</div><Pill c="#2EE5A0">{teamResps.length} received</Pill></div>
              <button onClick={simTeam} style={{width:"100%",padding:"8px",borderRadius:7,border:"1.5px dashed #1E0D38",background:"transparent",color:"#E4D8FF",fontFamily:FB,fontSize:11,marginBottom:8}} onMouseOver={e=>e.currentTarget.style.borderColor="#2EE5A0"} onMouseOut={e=>e.currentTarget.style.borderColor="#1E0D38"}>+ Simulate Team Response</button>
              <Btn onClick={async()=>{if(!orgRpt)await genOrgReport();setStage("org_report");}} v="purple" full disabled={orgLoad}>{orgLoad?"Generating…":"Generate Full Org Report →"}</Btn>
            </div>
          </div>
          <div style={CS} className="fu">
            <div style={{fontFamily:FS,fontWeight:700,color:"#fff",fontSize:15,marginBottom:13}}>Organisational Readiness</div>
            {DIMS.map(d=>(
              <div key={d.id} style={{marginBottom:11}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:"#E4D8FF",fontSize:12,fontFamily:FB}}>{d.icon} {d.label}</span><span style={{color:d.color,fontWeight:700,fontSize:12,fontFamily:FS}}>{scores.dim[d.id]}</span></div>
                <div style={{height:4,background:"#1E0D38",borderRadius:2}}><div style={{height:"100%",width:scores.dim[d.id]+"%",background:`linear-gradient(90deg,${d.color},#B050FF)`,borderRadius:2,transition:"width 1.3s ease"}}/></div>
              </div>
            ))}
          </div>
        </div>
        <div style={{...CS,marginBottom:13}} className="fu">
          <div style={{fontFamily:FS,fontWeight:700,color:"#fff",fontSize:15,marginBottom:16,paddingBottom:13,borderBottom:"1px solid #1E0D38"}}>Strategy Reports</div>
          <ReportBlock title="Organisational AI Assessment" content={rpt.assessment} color="#FF6B00" icon="◈"/>
          <div style={{height:1,background:"#1E0D38",margin:"3px 0"}}/>
          <ReportBlock title="90-Day Strategy Plan" content={rpt.strategy} color="#B050FF" icon="◆"/>
          <div style={{height:1,background:"#1E0D38",margin:"3px 0"}}/>
          <ReportBlock title="Leadership Upskilling Plan" content={rpt.coaching} color="#FFAA60" icon="◎"/>
        </div>
        {orgRpt&&<div style={{...CS,border:"1px solid #FF6B00",marginBottom:13}} className="fu">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
            <div style={{fontFamily:FS,fontWeight:800,fontSize:16,background:G,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>◈ Full Organisational AI Strategy Document</div>
            <div style={{display:"flex",gap:7}}><Pill c="#2EE5A0">✓ Included</Pill><Btn onClick={()=>setStage("org_report")} size="sm" v="soft">View Full →</Btn></div>
          </div>
          <ReportBlock title="Document Preview" content={orgRpt.slice(0,500)+"…"} color="#FF6B00" icon="◈"/>
        </div>}
        <div style={CS} className="fu">
          <div style={{fontFamily:FS,fontWeight:800,color:"#fff",fontSize:16,marginBottom:4}}>Team Course Recommendations</div>
          <div style={{color:"#9478C0",fontSize:12,fontFamily:FB,marginBottom:16}}>Based on org skill gap: <strong style={{color:arc.color}}>{arc.skillGap}</strong></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(185px,1fr))",gap:10}}>
            {getCoursesForArc(arc).map((c,i)=><CourseCard key={c.id} course={c} highlight={i===0}/>)}
          </div>
        </div>
      </div>
    </div>
  );

  // ── ORG REPORT
  if(stage==="org_report") return(
    <div style={{minHeight:"100vh",background:"#07030F",paddingTop:26,paddingBottom:72}}>
      <div style={WP}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22,flexWrap:"wrap",gap:9}}>
          <Logo/>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={()=>setStage("exec_hub")} v="ghost" size="sm">← Executive Hub</Btn>
            <button onClick={reset} style={{background:"none",border:"1px solid #1E0D38",borderRadius:7,color:"#E4D8FF",padding:"5px 12px",fontSize:11,fontFamily:FB}}>↩ Restart</button>
          </div>
        </div>
        <div style={{...CS,border:"1px solid #FF6B00"}} className="fu">
          <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:20,paddingBottom:15,borderBottom:"1px solid #1E0D38"}}>
            <LogoMark size={28}/>
            <div>
              <div style={{fontFamily:FS,fontWeight:800,fontSize:17,color:"#fff"}}>Organisational AI Strategy Document</div>
              <div style={{color:"#9478C0",fontSize:11,fontFamily:FB}}>{profile.company} · {profile.industry} · {teamResps.length} team responses · {profile.role}: {profile.name}</div>
            </div>
            <Pill c="#FF6B00" size="md" style={{marginLeft:"auto"}}>Confidential</Pill>
          </div>
          {orgLoad
            ?<div style={{display:"flex",alignItems:"center",gap:11,color:"#E4D8FF",padding:"26px 0",fontFamily:FB,fontSize:14}}><div style={{width:20,height:20,border:"2px solid #1E0D38",borderTop:"2px solid #FF6B00",borderRadius:"50%",animation:"spin 1s linear infinite",flexShrink:0}}/>Generating strategy document for {profile.company}…</div>
            :<ReportBlock title="Full Organisational AI Strategy Document" content={orgRpt} color="#FF6B00" icon="◈"/>
          }
        </div>
      </div>
    </div>
  );

  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
